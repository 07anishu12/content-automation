<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Slide</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-color: #E63946;
            --bg-color: #0d0e12;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #a0a5b5;
        }

        body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1350px;
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            padding: 80px;
            position: relative;
            overflow: hidden;
        }

        /* Abstract Premium Geometric Background Elements */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--brand-color) 0%, transparent 70%);
            opacity: 0.15;
            filter: blur(100px);
            border-radius: 50%;
            top: -100px;
            right: -100px;
            z-index: 1;
        }

        .bg-glow-bottom {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #5E6AD2 0%, transparent 70%);
            opacity: 0.12;
            filter: blur(80px);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
            z-index: 1;
        }

        /* Header block */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }

        .brand-badge {
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-badge::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--brand-color);
            border-radius: 50%;
        }

        .slide-tag {
            font-size: 14px;
            font-weight: 700;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 30px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Main Content Container */
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
            margin: 60px 0;
        }

        /* Title Slide Layout */
        .title-container {
            text-align: left;
        }

        .title-eyebrow {
            font-size: 24px;
            font-weight: 700;
            color: var(--brand-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .main-headline {
            font-size: 68px;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -2px;
            margin: 0 0 30px 0;
        }

        .main-headline span.highlight {
            color: var(--brand-color);
            position: relative;
        }

        .main-headline span.italic-accent {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-weight: 700;
            color: var(--text-secondary);
        }

        .title-subtitle {
            font-size: 24px;
            color: var(--text-secondary);
            line-height: 1.5;
            max-width: 850px;
            margin: 0;
        }

        /* Content Slide Layout */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 60px;
            backdrop-filter: blur(10px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .card-number {
            font-size: 32px;
            font-weight: 800;
            color: var(--brand-color);
            background-color: rgba(230, 57, 70, 0.1);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .card-title {
            font-size: 38px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
        }

        .card-body {
            font-size: 24px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin: 0;
        }

        /* Footer block */
        footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2;
        }

        .user-tag {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .swipe-indicator {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 16px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .swipe-arrow {
            display: inline-block;
            width: 25px;
            height: 2px;
            background-color: var(--brand-color);
            position: relative;
        }

        .swipe-arrow::after {
            content: '';
            position: absolute;
            right: 0;
            top: -4px;
            width: 10px;
            height: 10px;
            border-top: 2px solid var(--brand-color);
            border-right: 2px solid var(--brand-color);
            transform: rotate(45deg);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-bottom"></div>

    <header>
        <div class="brand-badge" id="brand-name">FOUNDERWING</div>
        <div class="slide-tag" id="slide-number-tag">01 / 07</div>
    </header>

    <main id="slide-content">
        <!-- Dynamic content injected here -->
        <div class="title-container">
            <div class="title-eyebrow" id="eyebrow">STRATEGY</div>
            <h1 class="main-headline" id="headline">How to build an <span class="highlight">Unfair</span> <span class="italic-accent">Advantage</span></h1>
            <p class="title-subtitle" id="subtitle">The frameworks top founders use to scale from zero to millions.</p>
        </div>
    </main>

    <footer>
        <div class="user-tag" id="user-handle">@founderswing</div>
        <div class="swipe-indicator" id="footer-action">
            <span>Swipe Left</span>
            <div class="swipe-arrow"></div>
        </div>
    </footer>
</body>
</html>
